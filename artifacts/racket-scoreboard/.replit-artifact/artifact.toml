kind = "web"
previewPath = "/"
title = "Racket Scoreboard"
version = "1.0.0"
id = "artifacts/racket-scoreboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23641

[services.development]
run = "pnpm --filter @workspace/racket-scoreboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/racket-scoreboard", "run", "build" ]
publicDir = "artifacts/racket-scoreboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23641"
BASE_PATH = "/"
